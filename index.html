<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>健身助手</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .no-select { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
    .scrollbar-none::-webkit-scrollbar { display: none; }
    .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }
    
    .progress-segment { transition: all 0.3s ease; }
    .ut-transition { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    .ut-bar-transition { transition: width 1s linear, background-color 0.4s ease; }
    @keyframes pulse-timer {
      0%, 100% { background-color: #f59e0b; color: #09090b; }
      50% { background-color: #d97706; color: #ffffff; }
    }
    @keyframes pulse-stopwatch {
      0%, 100% { background-color: #d946ef; color: #09090b; }
      50% { background-color: #a21caf; color: #ffffff; }
    }
    .timer-flashing { animation: pulse-timer 1s infinite ease-in-out; }
    .stopwatch-flashing { animation: pulse-stopwatch 1s infinite ease-in-out; }
    .fake-password { -webkit-text-security: disc; }

    /* 隱藏原生 Number Input 的上下箭嘴 */
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type="number"] {
      -moz-appearance: textfield;
    }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 font-sans antialiased no-select">

  <div class="max-w-md mx-auto h-[100dvh] flex flex-col bg-zinc-900 shadow-2xl relative pb-[68px]">
    
    <header class="bg-zinc-800 border-b border-zinc-700 px-4 py-3 shrink-0 z-40 flex justify-between items-center">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-full bg-emerald-500 flex items-center justify-center text-zinc-950 font-bold">
          <i class="fa-solid fa-dumbbell"></i>
        </div>
        <div>
          <h1 class="text-sm font-black text-emerald-400 leading-tight">健身助手</h1>
          <p class="text-[10px] text-zinc-400">記錄與 AI 對話</p>
        </div>
      </div>
    </header>

    <main id="main-content" class="flex-1 flex flex-col overflow-hidden p-4 relative transition-all duration-300">
      
      <section id="tab-workout" class="tab-section flex-1 flex flex-col overflow-hidden">
        <div class="shrink-0">
          <div class="bg-zinc-800 p-1 rounded-xl flex gap-1 mb-3 border border-zinc-700">
            <button onclick="switchDay('A')" id="btn-day-A" class="flex-1 py-2 text-center text-xs font-black rounded-lg transition-all bg-emerald-500 text-zinc-950 shadow-md">課表 A</button>
            <button onclick="switchDay('B')" id="btn-day-B" class="flex-1 py-2 text-center text-xs font-black rounded-lg transition-all text-zinc-400 hover:text-zinc-200">課表 B</button>
            <button onclick="switchDay('C')" id="btn-day-C" class="flex-1 py-2 text-center text-xs font-black rounded-lg transition-all text-zinc-400 hover:text-zinc-200">課表 C</button>
          </div>
          <div class="flex justify-between items-center mb-2 px-1">
            <h2 id="day-title" class="text-xs font-black text-zinc-300 uppercase tracking-wider">課表 A</h2>
            <button onclick="openRoutineManager()" class="text-[10px] text-emerald-400 hover:text-emerald-300 font-bold flex items-center gap-1 active:scale-95">
              <i class="fa-solid fa-sliders"></i> 編輯課表
            </button>
          </div>
          <div id="station-progress-bar" class="flex gap-1.5 mb-3"></div>
        </div>

        <div id="single-exercise-container" class="flex-1 overflow-y-auto scrollbar-none pb-2 flex flex-col"></div>

        <div id="station-nav-buttons" class="shrink-0 grid grid-cols-2 gap-3 pt-3 mt-1 border-t border-zinc-800/80">
          <button onclick="prevStation()" id="btn-prev-station" class="bg-zinc-800 hover:bg-zinc-750 text-zinc-300 border border-zinc-700 font-black py-3 rounded-xl text-xs active:scale-95 transition-all flex items-center justify-center gap-2 disabled:opacity-30 disabled:active:scale-100">
            <i class="fa-solid fa-arrow-left"></i> 上一站
          </button>
          <button onclick="nextStation()" id="btn-next-station" class="bg-emerald-500 hover:bg-emerald-400 text-zinc-950 font-black py-3 rounded-xl text-xs active:scale-95 transition-all flex items-center justify-center gap-2 disabled:opacity-30 disabled:active:scale-100 shadow-md shadow-emerald-500/20">
            下一站 <i class="fa-solid fa-arrow-right"></i>
          </button>
        </div>
      </section>

      <section id="tab-progress" class="tab-section hidden flex-1 flex flex-col overflow-y-auto">
        <h2 class="text-base font-bold text-zinc-100 mb-4 flex items-center gap-2 shrink-0"><i class="fa-solid fa-chart-line text-emerald-400"></i> 訓練與身體數據</h2>
        <div class="grid grid-cols-2 gap-3 mb-4 shrink-0">
          <button onclick="exportToCSV()" class="bg-emerald-500 hover:bg-emerald-400 active:scale-95 transition-all text-zinc-950 font-black py-2.5 rounded-xl text-xs flex items-center justify-center gap-2 shadow-lg">
            <i class="fa-solid fa-file-csv"></i> 匯出 CSV
          </button>
          <button onclick="clearAllWorkoutLogs()" class="bg-zinc-850 hover:bg-zinc-800 active:scale-95 transition-all border border-zinc-700 text-red-400 font-bold py-2.5 rounded-xl text-xs flex items-center justify-center gap-2 shadow-lg">
            <i class="fa-solid fa-trash-can"></i> 清除歷史
          </button>
        </div>
        
        <div class="bg-zinc-800 p-4 rounded-xl border border-zinc-700 mb-4 shrink-0">
          <h4 class="text-xs font-bold text-zinc-200 mb-3">📋 訓練記錄</h4>
          <div class="space-y-2 max-h-60 overflow-y-auto pr-1" id="workout-history-list"></div>
        </div>

        <div class="bg-zinc-800 p-4 rounded-xl border border-zinc-700 shrink-0">
          <h4 class="text-xs font-bold mb-3 text-zinc-200">📊 身體數據</h4>
          <div class="grid grid-cols-2 gap-3 mb-3">
            <div>
              <label class="text-[10px] text-zinc-400 block mb-1">體重 (kg)</label>
              <input type="number" inputmode="decimal" pattern="[0-9]*" id="input-weight" value="73.0" step="0.1" class="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2 text-sm text-zinc-100 font-bold focus:outline-none focus:border-emerald-500 appearance-none">
            </div>
            <div>
              <label class="text-[10px] text-zinc-400 block mb-1">體脂率 (%)</label>
              <input type="number" inputmode="decimal" pattern="[0-9]*" id="input-bf" value="27.0" step="0.1" class="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2 text-sm text-zinc-100 font-bold focus:outline-none focus:border-emerald-500 appearance-none">
            </div>
          </div>
          <button onclick="saveBodyStats()" class="w-full bg-emerald-500 hover:bg-emerald-400 text-zinc-950 font-bold py-2 rounded-lg text-xs transition-colors">記錄今日數據</button>
          <div class="mt-3 space-y-2 border-t border-zinc-750 pt-3" id="body-history-list"></div>
        </div>
      </section>

      <section id="tab-ai" class="tab-section hidden flex-1 flex flex-col overflow-hidden">
        <div class="bg-zinc-800/60 border border-zinc-700/80 rounded-xl p-3 mb-3 flex items-center justify-between shrink-0">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-zinc-700 flex items-center justify-center text-emerald-400 font-black text-lg">
              <i class="fa-solid fa-robot"></i>
            </div>
            <div>
              <h3 class="text-xs font-black text-emerald-400">AI 教練</h3>
            </div>
          </div>
          <button onclick="openApiKeyModal()" class="w-8 h-8 rounded-lg bg-zinc-700/80 hover:bg-zinc-600 text-zinc-300 flex items-center justify-center transition-colors shadow">
            <i class="fa-solid fa-gear text-[10px]"></i>
          </button>
        </div>

        <div id="ai-chat-box" class="flex-1 overflow-y-auto space-y-3.5 mb-3 pr-1 py-1 flex flex-col text-xs scrollbar-none">
          <div class="bg-zinc-800 text-zinc-100 border border-zinc-750 max-w-[85%] rounded-2xl rounded-tl-none p-3 self-start leading-relaxed shadow">
            你好，我係 AI 教練阿聰。有咩可以幫到手？<br><br>
            👉 <strong>「幫我記低今日體重 72.5kg」</strong><br>
            👉 <strong>「深蹲第一組 16kg 12下」</strong><br>
          </div>
        </div>

        <div class="flex gap-1.5 overflow-x-auto pb-2 shrink-0 scrollbar-none whitespace-nowrap text-[10px] text-zinc-300">
          <button onclick="autofillChat('我今日體重 72.5kg')" class="px-2.5 py-1.5 bg-zinc-800/80 border border-zinc-700 rounded-full font-bold">⚖️ 記體重 72.5kg</button>
          <button onclick="autofillChat('深蹲第一組 16kg 12下')" class="px-2.5 py-1.5 bg-zinc-800/80 border border-zinc-700 rounded-full font-bold">🏋️ 紀錄 Set 1</button>
          <button onclick="autofillChat('有咩減脂建議？')" class="px-2.5 py-1.5 bg-zinc-800/80 border border-zinc-700 rounded-full font-bold">💡 減脂建議</button>
        </div>

        <div class="bg-zinc-800 border border-zinc-700 rounded-xl p-1.5 flex gap-1.5 shrink-0 shadow-md">
          <input type="text" id="ai-user-input" onkeydown="handleChatKeydown(event)" placeholder="輸入訊息..." class="flex-1 bg-transparent border-none text-xs text-zinc-100 font-bold focus:outline-none pl-2.5">
          <button onclick="sendChatMessage()" id="btn-chat-send" class="w-10 h-8 rounded-lg bg-emerald-500 text-zinc-950 font-black flex items-center justify-center active:scale-95">
            <i class="fa-solid fa-paper-plane text-xs"></i>
          </button>
        </div>
      </section>

    </main>

    <div id="universal-timer-banner" class="hidden fixed bottom-[68px] left-0 right-0 max-w-md mx-auto bg-zinc-950/95 backdrop-blur border-t border-zinc-800 shadow-[0_-15px_40px_rgba(0,0,0,0.85)] z-40 ut-transition translate-y-full">
      <div class="px-4 py-3 flex items-center justify-between gap-3">
        <div class="flex-1">
          <span id="ut-badge" class="px-2 py-0.5 rounded text-[10px] font-black uppercase tracking-widest bg-emerald-500 text-zinc-950">REST 休息</span>
          <div id="ut-title" class="text-[10px] text-zinc-400 mt-1.5 font-bold tracking-wider truncate">準備下一組</div>
        </div>
        <div class="text-[44px] font-black font-mono leading-none tracking-tighter text-emerald-400" id="ut-time" style="font-variant-numeric: tabular-nums;">
          60
        </div>
        <div class="flex-1 flex justify-end gap-2 items-center">
          <button onclick="utAdd15s()" id="btn-ut-add" class="w-9 h-9 bg-zinc-800 hover:bg-zinc-700 text-zinc-300 rounded-full flex items-center justify-center active:scale-90 transition-transform text-[10px] font-black border border-zinc-700 shadow">+15</button>
          <button onclick="utPause()" id="btn-ut-pause" class="w-10 h-10 bg-zinc-800 hover:bg-zinc-700 text-zinc-300 rounded-full flex items-center justify-center active:scale-90 transition-transform shadow border border-zinc-700"><i class="fa-solid fa-pause text-sm"></i></button>
          <button onclick="utStop()" id="btn-ut-stop" class="w-10 h-10 bg-red-950/80 hover:bg-red-900 text-red-400 rounded-full flex items-center justify-center active:scale-90 transition-transform border border-red-900 shadow"><i class="fa-solid fa-stop text-sm"></i></button>
        </div>
      </div>
      <div class="h-1.5 w-full bg-zinc-900 overflow-hidden"><div id="ut-progress" class="h-full bg-emerald-500 w-full ut-bar-transition"></div></div>
    </div>

    <div id="toast-msg" class="hidden fixed top-20 left-1/2 -translate-x-1/2 bg-zinc-800 border border-emerald-500 text-emerald-400 font-extrabold px-4 py-2.5 rounded-full text-[11px] shadow-2xl z-50 flex items-center gap-2 transition-all">
      <i class="fa-solid fa-circle-info" id="toast-icon"></i><span id="toast-text">提示</span>
    </div>

    <nav class="bg-zinc-800 border-t border-zinc-700 h-[68px] fixed bottom-0 left-0 right-0 max-w-md mx-auto z-50 flex justify-around items-center">
      <button onclick="navigateTab('workout')" id="nav-workout" class="flex flex-col items-center justify-center flex-1 h-full text-emerald-400 transition-colors"><i class="fa-solid fa-calendar-day text-base"></i><span class="text-[10px] mt-1 font-bold">今日課表</span></button>
      <button onclick="navigateTab('progress')" id="nav-progress" class="flex flex-col items-center justify-center flex-1 h-full text-zinc-400 hover:text-zinc-200 transition-colors"><i class="fa-solid fa-chart-line text-base"></i><span class="text-[10px] mt-1 font-bold">數據歷史</span></button>
      <button onclick="navigateTab('ai')" id="nav-ai" class="flex flex-col items-center justify-center flex-1 h-full text-zinc-400 hover:text-zinc-200 transition-colors"><i class="fa-solid fa-robot text-base"></i><span class="text-[10px] mt-1 font-bold">AI 教練</span></button>
    </nav>
  </div>

  <div id="routine-manager-modal" class="hidden fixed inset-0 z-50 bg-zinc-950/98 backdrop-blur-md overflow-y-auto no-select">
    <div class="max-w-md mx-auto min-h-[100dvh] bg-zinc-900 shadow-2xl flex flex-col p-4 pb-20">
      <div class="flex justify-between items-center border-b border-zinc-800 pb-3 mb-4">
        <div><h2 class="text-sm font-black text-emerald-400">動作庫與課表編輯</h2></div>
        <button onclick="closeRoutineManager()" class="w-8 h-8 rounded-full bg-zinc-800 text-zinc-400 active:text-white"><i class="fa-solid fa-xmark"></i></button>
      </div>

      <details class="bg-zinc-850 border border-zinc-750 rounded-xl p-3.5 mb-4 group">
        <summary class="text-xs font-black text-emerald-300 cursor-pointer list-none flex items-center justify-between">
          <span><i class="fa-solid fa-plus-circle mr-1"></i> 新增自訂動作</span>
          <i class="fa-solid fa-chevron-down text-[10px] group-open:rotate-180 transition-transform"></i>
        </summary>
        <div class="mt-4 space-y-3 border-t border-zinc-800 pt-3 text-xs">
          <input type="text" id="cust-name" placeholder="動作名稱" class="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2 text-zinc-200 focus:outline-none focus:border-emerald-500">
          <div class="grid grid-cols-2 gap-3">
            <select id="cust-muscle" class="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-2 py-2 text-zinc-200"><option value="chest">胸部</option><option value="back">背部</option><option value="leg">腿部</option><option value="shoulder">肩膀</option><option value="arm">手臂</option><option value="core">核心</option></select>
            <select id="cust-type" class="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-2 py-2 text-zinc-200"><option value="freeweight">自由重量</option><option value="machine">器械</option><option value="bodyweight">自重</option></select>
          </div>
          <button onclick="createNewCustomExercise()" class="w-full bg-emerald-500 text-zinc-950 font-black py-2.5 rounded-lg text-xs hover:bg-emerald-400 active:scale-95 transition-transform">儲存並加入動作庫</button>
        </div>
      </details>

      <div class="bg-zinc-800 p-3 rounded-xl border border-zinc-750 mb-4 space-y-2.5 text-xs">
        <input type="text" id="search-exercise-input" oninput="filterRoutineLibrary()" placeholder="搜尋動作..." class="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2 text-zinc-200 focus:outline-none focus:border-emerald-500">
      </div>
      
      <div class="flex-1 space-y-2.5 overflow-y-auto max-h-[50vh] pr-1" id="routine-library-list"></div>
      
      <div class="mt-4 pt-3 border-t border-zinc-800">
        <button onclick="closeRoutineManager()" class="w-full bg-emerald-500 text-zinc-950 font-black py-3 rounded-xl text-xs hover:bg-emerald-400 active:scale-95 transition-transform">確認</button>
      </div>
    </div>
  </div>

  <div id="apikey-modal" class="hidden fixed inset-0 z-[60] bg-zinc-950/98 backdrop-blur-md flex items-center justify-center p-4 no-select">
    <div class="w-full max-w-sm bg-zinc-900 border border-zinc-750 rounded-2xl p-5 shadow-2xl">
      <div class="flex justify-between items-start mb-2">
        <h3 class="text-sm font-black text-emerald-400">AI 模型設定</h3>
      </div>
      <p class="text-[10px] text-zinc-400 mb-4 leading-relaxed">請輸入 Gemini API Key。</p>
      
      <input type="text" id="input-api-key" placeholder="API Key" class="fake-password w-full bg-zinc-950 border border-zinc-700 rounded-lg px-3 py-3 text-xs text-zinc-100 font-mono focus:outline-none focus:border-emerald-500 mb-4">
      
      <label class="block text-[10px] text-zinc-400 mb-1.5 font-bold">選擇模型：</label>
      <select id="input-ai-model" class="w-full bg-zinc-950 border border-zinc-700 rounded-lg px-3 py-3 text-xs text-zinc-100 focus:outline-none focus:border-emerald-500 mb-5">
        <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
        <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
      </select>

      <div class="flex gap-2">
        <button onclick="closeApiKeyModal()" class="flex-1 py-2.5 bg-zinc-800 hover:bg-zinc-700 text-zinc-300 rounded-xl text-xs font-bold transition-colors">取消</button>
        <button onclick="saveApiKey()" class="flex-1 py-2.5 bg-emerald-500 hover:bg-emerald-400 text-zinc-950 rounded-xl text-xs font-black transition-colors">儲存</button>
      </div>
    </div>
  </div>

  <script>
    function playBeep(f=587.33, d=0.15) { 
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(f, audioCtx.currentTime); gain.gain.setValueAtTime(0.08, audioCtx.currentTime); 
        osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + d);
      } catch (e) {}
    }

    function showToast(msg, isError = false) {
      document.getElementById('toast-text').innerText = msg;
      const t = document.getElementById('toast-msg');
      const icon = document.getElementById('toast-icon');
      
      if(isError) {
        t.className = "fixed top-20 left-1/2 -translate-x-1/2 bg-zinc-900 border border-red-500 text-red-400 font-extrabold px-4 py-2.5 rounded-full text-[11px] shadow-2xl z-50 flex items-center gap-2 transition-all";
        icon.className = "fa-solid fa-triangle-exclamation";
      } else {
        t.className = "fixed top-20 left-1/2 -translate-x-1/2 bg-zinc-800 border border-emerald-500 text-emerald-400 font-extrabold px-4 py-2.5 rounded-full text-[11px] shadow-2xl z-50 flex items-center gap-2 transition-all";
        icon.className = "fa-solid fa-circle-check";
      }
      
      t.classList.remove('hidden'); 
      setTimeout(() => t.classList.add('hidden'), 3500);
    }

    let currentDay = 'A'; 
    let currentStationIndex = 0; 
    let workoutLogs = {}; 
    let bodyHistory = []; 
    let activeInputs = {}; 
    let exerciseSetsCount = {}; 
    let customExercises = [];
    
    let assignedRoutines = { 
        'A': ['a0_warmup', 'a1', 'a2', 'a3', 'a4', 'a5'], 
        'B': ['b0_warmup', 'b1', 'b2', 'b3', 'b4', 'b5'], 
        'C': ['c0_warmup', 'c1', 'c2', 'c3', 'c4_hiit'] 
    };
    
    let uniTimer = { active: false, paused: false, interval: null, mode: '', remaining: 0, total: 0, exId: null, setNum: null, hiitRound: 1, hiitPhase: 'sprint', title: '' };

    const svgPresets = {
      'cardio': `<svg viewBox="0 0 100 100" class="w-14 h-14 mx-auto"><path d="M15 50 L30 50 L40 20 L60 80 L70 50 L85 50" stroke="#10b981" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round" class="animate-pulse"/><circle cx="85" cy="50" r="4" fill="#f59e0b" class="animate-ping"/></svg>`,
      'squat': `<svg viewBox="0 0 100 100" class="w-14 h-14 mx-auto"><line x1="20" y1="30" x2="80" y2="30" stroke="#6b7280" stroke-width="4" stroke-linecap="round"/><line x1="20" y1="15" x2="20" y2="45" stroke="#10b981" stroke-width="8" stroke-linecap="round"/><line x1="80" y1="15" x2="80" y2="45" stroke="#10b981" stroke-width="8" stroke-linecap="round"/><g class="animate-bounce"><path d="M50 45 L50 75 M40 65 L50 75 L60 65" stroke="#f59e0b" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g></svg>`,
      'benchpress': `<svg viewBox="0 0 100 100" class="w-14 h-14 mx-auto"><line x1="10" y1="75" x2="90" y2="75" stroke="#6b7280" stroke-width="6" stroke-linecap="round"/><g class="animate-pulse"><line x1="20" y1="35" x2="80" y2="35" stroke="#6b7280" stroke-width="4" stroke-linecap="round"/><line x1="20" y1="20" x2="20" y2="50" stroke="#10b981" stroke-width="8" stroke-linecap="round"/><line x1="80" y1="20" x2="80" y2="50" stroke="#10b981" stroke-width="8" stroke-linecap="round"/><path d="M50 65 L50 40 M40 50 L50 40 L60 50" stroke="#f59e0b" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g></svg>`,

    function getFullPool() { return baselineExercises.concat(customExercises); }
    function getTodayStr() { return new Date().toISOString().split('T')[0]; }

    function loadData() {
      const logs = localStorage.getItem('gym_coach_logs'); if (logs) workoutLogs = JSON.parse(logs);
      const cust = localStorage.getItem('gym_coach_custom_exercises'); if (cust) customExercises = JSON.parse(cust);
      const assigned = localStorage.getItem('gym_coach_assigned_routines'); if (assigned) assignedRoutines = JSON.parse(assigned);
      const sets = localStorage.getItem('gym_coach_sets_counts'); if (sets) exerciseSetsCount = JSON.parse(sets);
      const hist = localStorage.getItem('gym_coach_body_history'); if (hist) bodyHistory = JSON.parse(hist);
      renderHistory(); renderBodyStats();
    }
    
    function saveData() {
      localStorage.setItem('gym_coach_logs', JSON.stringify(workoutLogs));
      localStorage.setItem('gym_coach_custom_exercises', JSON.stringify(customExercises));
      localStorage.setItem('gym_coach_assigned_routines', JSON.stringify(assignedRoutines));
      localStorage.setItem('gym_coach_sets_counts', JSON.stringify(exerciseSetsCount));
      localStorage.setItem('gym_coach_body_history', JSON.stringify(bodyHistory));
    }

    function renderHistory() {
      const historyList = document.getElementById('workout-history-list');
      if(!historyList) return;
      historyList.innerHTML = '';
      const dates = Object.keys(workoutLogs).sort().reverse();
      if(dates.length === 0) {
         historyList.innerHTML = '<p class="text-zinc-500 text-[11px] text-center py-4">暫無記錄</p>';
      } else {
         dates.forEach(d => {
            let html = `<div class="bg-zinc-900 p-3 rounded-lg border border-zinc-800 mb-2"><h5 class="text-emerald-400 text-xs font-bold mb-2 border-b border-zinc-800 pb-1.5">${d}</h5><div class="space-y-2">`;
            const dayLogs = workoutLogs[d];
            for(let exId in dayLogs) {
               const exName = getFullPool().find(e => e.id === exId)?.name || exId;
               const setsInfo = dayLogs[exId].map(s => `<span class="bg-zinc-800 border border-zinc-700 px-1.5 py-0.5 rounded text-zinc-300 mr-1 shadow-sm font-mono">${s.weight}kg × ${s.reps}</span>`).join('');
               html += `<div class="text-[11px]"><span class="text-zinc-200 font-bold block mb-1">${exName}:</span> <div class="flex flex-wrap gap-y-1">${setsInfo}</div></div>`;
            }
            html += `</div></div>`;
            historyList.innerHTML += html;
         });
      }
    }

    function renderBodyStats() {
      const list = document.getElementById('body-history-list');
      if(!list) return;
      list.innerHTML = '';
      if(bodyHistory.length === 0) {
          list.innerHTML = '<p class="text-[10px] text-zinc-500 text-center py-2">暫無數據</p>';
      } else {
          [...bodyHistory].reverse().forEach(b => {
              list.innerHTML += `<div class="flex justify-between items-center text-[11px] bg-zinc-900 px-3 py-2 rounded-lg border border-zinc-800"><span class="text-zinc-400 font-mono">${b.date}</span><span class="text-emerald-300 font-bold tracking-wide">${b.weight} kg <span class="text-zinc-600 mx-1">|</span> ${b.bf}%</span></div>`;
          });
      }
    }

    function saveBodyStats() {
      const w = parseFloat(document.getElementById('input-weight').value);
      const bf = parseFloat(document.getElementById('input-bf').value);
      if(!w || !bf) return showToast("請輸入有效數字。", true);
      const d = getTodayStr();
      bodyHistory = bodyHistory.filter(x => x.date !== d);
      bodyHistory.push({date: d, weight: w, bf: bf});
      saveData(); renderBodyStats(); showToast("數據已儲存。");
    }
    
    function exportToCSV() { 
        if(Object.keys(workoutLogs).length === 0) return showToast("沒有記錄可匯出。", true);
        
        let csv = "Date,Exercise,Set,Weight(kg),Reps/Seconds\n";
        const pool = getFullPool();
        
        Object.keys(workoutLogs).sort().reverse().forEach(date => {
            const dayLogs = workoutLogs[date];
            for (let exId in dayLogs) {
                const exName = pool.find(e => e.id === exId)?.name || exId;
                dayLogs[exId].forEach(s => {
                    csv += `${date},"${exName}",${s.set},${s.weight},${s.reps}\n`;
                });
            }
        });

        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const file = new File([blob], `Workout_History_${getTodayStr()}.csv`, { type: 'text/csv' });

        if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
            navigator.share({
                title: '健身紀錄 CSV',
                text: '這是我的健身訓練紀錄！',
                files: [file]
            }).then(() => showToast("分享成功。")).catch(e => console.log(e));
        } else {
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url; a.download = `Workout_History_${getTodayStr()}.csv`;
            a.click(); URL.revokeObjectURL(url);
            showToast("CSV 已下載。");
        }
    }
    
    function clearAllWorkoutLogs() { 
        if(confirm("確定要清除所有訓練歷史數據？此動作無法復原。")) {
            workoutLogs = {}; 
            saveData(); 
            renderWorkout(); 
            renderHistory(); 
            showToast("記錄已清空。"); 
        }
    }

        document.getElementById('routine-manager-modal').classList.remove('hidden'); 
        filterRoutineLibrary();
    }
    
    function closeRoutineManager() { 
        document.getElementById('routine-manager-modal').classList.add('hidden'); 
        currentStationIndex = 0; 
        renderWorkout(); 
    }

            const isActive = activeIds.includes(ex.id);

            <div class="bg-zinc-800 p-3 rounded-xl border border-zinc-700 flex justify-between items-center gap-3 mb-2 shadow-sm transition-colors ${isActive ? 'ring-1 ring-emerald-500/50' : ''}">

    function toggleRoutine(exId) {
        if(!assignedRoutines[currentDay]) assignedRoutines[currentDay] = [];
        if(assignedRoutines[currentDay].includes(exId)) {
            assignedRoutines[currentDay] = assignedRoutines[currentDay].filter(id => id !== exId);
        } else {
            assignedRoutines[currentDay].push(exId);
        }
        saveData();
        filterRoutineLibrary();
    }
    
    function createNewCustomExercise() {
        const name = document.getElementById('cust-name').value.trim();
        const muscle = document.getElementById('cust-muscle').value;
        if(!name) return showToast("請輸入動作名稱。", true);
        
        const newEx = {
            id: 'cust_' + Date.now(),
            name: name,
            target: document.getElementById('cust-muscle').options[document.getElementById('cust-muscle').selectedIndex].text,
            muscleGroup: muscle,
            lcsdSetting: '自訂動作',
            defaultWeight: 0,
            defaultReps: 10,
            sets: 3,

            tips: [{type:'ok', text:'自訂訓練動作，請注意安全。'}]

        customExercises.push(newEx);
        saveData();
        document.getElementById('cust-name').value = '';
        filterRoutineLibrary();
        showToast("動作已加入。");
    }

    function checkStationDone(ex) {
      const d = getTodayStr(); if(!workoutLogs[d] || !workoutLogs[d][ex.id]) return false;
      const logged = workoutLogs[d][ex.id].length;
      if(ex.isWarmup || ex.isHiit) return logged > 0;
      return logged >= (exerciseSetsCount[ex.id] || ex.sets || 3);
    }
    
    function isSetLoggedToday(exId, setNum) {
      const d = getTodayStr(); if(!workoutLogs[d] || !workoutLogs[d][exId]) return false;
      return workoutLogs[d][exId].some(x => x.set === setNum);
    }

    function utStart(mode, seconds, context = {}) {
      if(uniTimer.interval) clearInterval(uniTimer.interval);
      uniTimer = { active: true, paused: false, mode: mode, remaining: seconds, total: seconds, ...context };
      const banner = document.getElementById('universal-timer-banner');
      banner.classList.remove('hidden'); setTimeout(() => { banner.classList.remove('translate-y-full'); }, 50);
      document.getElementById('main-content').classList.add('pb-[75px]');
      utUpdateUI(); if(mode !== 'rest') playBeep(523.25, 0.2); else playBeep(440, 0.15); 
      uniTimer.interval = setInterval(utTick, 1000);
    }
    
    function utTick() {
      if (uniTimer.paused) return; 
      
      if (uniTimer.mode === 'stopwatch') {
          uniTimer.remaining++; 
          utUpdateVisuals();
          return;
      }

      uniTimer.remaining--; utUpdateVisuals();
      if (uniTimer.remaining <= 3 && uniTimer.remaining > 0) playBeep(783.99, 0.08);
      if (uniTimer.remaining <= 0) {
        clearInterval(uniTimer.interval); playBeep(880, 0.45);
        if (uniTimer.mode === 'rest') { if(navigator.vibrate) navigator.vibrate([150, 80, 150]); utClose(); } 
        else if (uniTimer.mode === 'warmup') { utClose(); logSet(uniTimer.exId, 1, true); showToast("熱身完成。"); }
        else if (uniTimer.mode === 'set') { utClose(); logSet(uniTimer.exId, uniTimer.setNum || 1, true); }
        else if (uniTimer.mode === 'hiit') {
          if (uniTimer.hiitPhase === 'sprint') { utStart('hiit', 60, { hiitPhase: 'recover', hiitRound: uniTimer.hiitRound, exId: uniTimer.exId }); playBeep(440, 0.35); } 
          else {
            const nextRound = uniTimer.hiitRound + 1;
            if (nextRound > 8) { playBeep(987.77, 0.6); utClose(); logSet(uniTimer.exId, 1, true); showToast("HIIT 已完成。"); } 
            else { utStart('hiit', 30, { hiitPhase: 'sprint', hiitRound: nextRound, exId: uniTimer.exId }); playBeep(783.99, 0.35); }
          }
        }
      }
    }
    
    function utUpdateVisuals() { 
        document.getElementById('ut-time').innerText = uniTimer.remaining; 
        if(uniTimer.mode !== 'stopwatch') {
            document.getElementById('ut-progress').style.width = `${(uniTimer.remaining / uniTimer.total) * 100}%`; 
        }
    }
    
    function utUpdateUI() {
      utUpdateVisuals();
      const badge = document.getElementById('ut-badge'); const title = document.getElementById('ut-title');
      const time = document.getElementById('ut-time'); const prog = document.getElementById('ut-progress');
      const btnAdd = document.getElementById('btn-ut-add');
      badge.className = "px-2 py-0.5 rounded text-[10px] font-black uppercase tracking-widest text-zinc-950 inline-block";
      time.className = "text-[44px] font-black font-mono leading-none tracking-tighter";
      prog.className = "h-full w-full ut-bar-transition"; btnAdd.classList.remove('hidden');

      if (uniTimer.mode === 'rest') { badge.classList.add('bg-emerald-500'); badge.innerText = "REST 休息"; title.innerText = uniTimer.title || "準備下一組"; time.classList.add('text-emerald-400'); prog.classList.add('bg-emerald-500'); } 
      else if (uniTimer.mode === 'warmup') { badge.classList.add('bg-blue-400'); badge.innerText = "WARMUP 熱身"; title.innerText = uniTimer.title || "進行中"; time.classList.add('text-blue-300'); prog.classList.add('bg-blue-400'); }
      else if (uniTimer.mode === 'set') { badge.classList.add('bg-amber-500'); badge.innerText = "ACTION 進行中"; title.innerText = uniTimer.title || `Set ${uniTimer.setNum} 倒數中`; time.classList.add('text-amber-400'); prog.classList.add('bg-amber-500'); }
      else if (uniTimer.mode === 'stopwatch') { 
          btnAdd.classList.add('hidden'); 
          badge.classList.add('bg-fuchsia-500'); badge.innerText = "ACTION 順數中"; title.innerText = uniTimer.title || `進行中`; time.classList.add('text-fuchsia-400'); prog.className = "h-full w-full bg-fuchsia-500 animate-pulse"; 
      }
      else if (uniTimer.mode === 'hiit') {
        btnAdd.classList.add('hidden'); 
        if (uniTimer.hiitPhase === 'sprint') { badge.classList.add('bg-red-500', 'animate-pulse'); badge.innerText = "SPRINT 衝刺"; title.innerHTML = `Round <span class="text-white">${uniTimer.hiitRound}</span> / 8`; time.classList.add('text-red-400'); prog.classList.add('bg-red-500'); } 
        else { badge.classList.add('bg-emerald-500'); badge.innerText = "RECOVER 恢復"; title.innerHTML = `Round <span class="text-white">${uniTimer.hiitRound}</span> / 8`; time.classList.add('text-emerald-400'); prog.classList.add('bg-emerald-500'); }
      }
      renderWorkout(); 
    }
    
    function utPause() { uniTimer.paused = !uniTimer.paused; const btn = document.getElementById('btn-ut-pause'); if (uniTimer.paused) { btn.innerHTML = `<i class="fa-solid fa-play text-sm"></i>`; btn.classList.replace('bg-zinc-800', 'bg-white'); btn.classList.replace('text-zinc-300', 'text-black'); } else { btn.innerHTML = `<i class="fa-solid fa-pause text-sm"></i>`; btn.classList.replace('bg-white', 'bg-zinc-800'); btn.classList.replace('text-black', 'text-zinc-300'); } }
    function utAdd15s() { uniTimer.remaining += 15; uniTimer.total += 15; utUpdateVisuals(); }
    
    function utStop() { 
        if (uniTimer.mode === 'stopwatch') {
            const rEl = document.getElementById(`r-${uniTimer.exId}-${uniTimer.setNum}`);
            if(rEl) {
                rEl.value = uniTimer.remaining; 
                updateVal(uniTimer.exId, uniTimer.setNum, 'r', uniTimer.remaining);
            }
            showToast("計時停止。");
        } else {
            showToast("計時已中止。"); 
        }
        utClose(); 
    }
    
    function utClose() { if(uniTimer.interval) clearInterval(uniTimer.interval); uniTimer.active = false; document.getElementById('universal-timer-banner').classList.add('translate-y-full'); document.getElementById('main-content').classList.remove('pb-[75px]'); setTimeout(() => { document.getElementById('universal-timer-banner').classList.add('hidden'); }, 300); renderWorkout(); }

    function moveExercise(direction) {
        const arr = assignedRoutines[currentDay];
        const idx = currentStationIndex;
        if(direction === -1 && idx > 0) {
            [arr[idx-1], arr[idx]] = [arr[idx], arr[idx-1]];
            currentStationIndex--;
            showToast("卡片已移前");
        } else if(direction === 1 && idx < arr.length - 1) {
            [arr[idx+1], arr[idx]] = [arr[idx], arr[idx+1]];
            currentStationIndex++;
            showToast("卡片已移後");
        }
        saveData(); renderWorkout();
    }

          <div class="px-4 pb-2">
            <details class="group bg-zinc-900 border border-zinc-800 rounded-lg">
              <summary class="text-[11px] text-amber-400 font-bold cursor-pointer list-none flex items-center justify-between p-3">
                <span><i class="fa-solid fa-chalkboard-user mr-1 text-base align-middle"></i> 訓練細節與注意事項</span><i class="fa-solid fa-chevron-down text-[10px] group-open:rotate-180 transition-transform"></i>
              </summary>
              <div class="px-3 pb-3 text-[11.5px]"><ul class="space-y-3 pt-2 border-t border-zinc-800">${tipsHtml}</ul></div>
            </details>
          </div>
          <div class="px-4 py-2 pb-4">
            <div class="mb-3 bg-zinc-900 border border-zinc-800 text-zinc-400 px-3 py-2 rounded-lg text-xs flex items-center justify-center gap-2 font-mono shadow-inner">
                <i class="fa-solid fa-clock-rotate-left"></i> <span class="text-emerald-300 font-bold">${lastPerfStr}</span>
            </div>
            
            <div class="space-y-2">
                ${setsHtml}
            </div>
            
            <div class="flex justify-end gap-2 pt-3 border-t border-zinc-700/50 mt-3">
              ${sets > 1 ? `<button onclick="adjSets('${ex.id}', -1)" class="px-3 py-1.5 bg-zinc-900 hover:bg-zinc-850 border border-zinc-750 text-zinc-400 text-[10px] font-bold rounded-lg flex items-center gap-1 active:scale-95"><i class="fa-solid fa-minus text-[8px]"></i> 減少</button>` : ''}
              <button onclick="adjSets('${ex.id}', 1)" class="px-3 py-1.5 bg-emerald-500/10 hover:bg-emerald-500/20 border border-emerald-500/20 text-emerald-400 text-[10px] font-black rounded-lg flex items-center gap-1 active:scale-95"><i class="fa-solid fa-plus text-[8px]"></i> 增加</button>
            </div>
          </div>
        </div>`;
      container.appendChild(card);
    }

    function prevStation() { if (currentStationIndex > 0) { currentStationIndex--; renderWorkout(); } }
    function jumpStation(idx) { currentStationIndex = idx; renderWorkout(); }
    function nextStation() {
      const activeIds = assignedRoutines[currentDay] || [];
      if (currentStationIndex < activeIds.length - 1) { currentStationIndex++; renderWorkout(); } 
      else { showToast("今日課表已完成。"); if(navigator.vibrate) navigator.vibrate([200, 100, 200]); }
    }
    function switchDay(d) {
      currentDay = d; currentStationIndex = 0; 
      ['A','B','C'].forEach(x => { document.getElementById(`btn-day-${x}`).className = x===d ? "flex-1 py-2 text-center text-xs font-black rounded-lg bg-emerald-500 text-zinc-950 shadow-md" : "flex-1 py-2 text-center text-xs font-black rounded-lg text-zinc-400 hover:text-zinc-200"; });
      utStop(); document.getElementById('day-title').innerText = { 'A': '課表 A', 'B': '課表 B', 'C': '課表 C' }[d]; renderWorkout();
    }

    function chgVal(id, s, type, delta) {
      const el = document.getElementById(`${type}-${id}-${s}`);
      if(el) {
        let n = (parseFloat(el.value)||0) + delta; el.value = Math.max(0, n);
        activeInputs[`${id}-${s}`] = activeInputs[`${id}-${s}`] || {weight:0, reps:0};
        if(type==='w') activeInputs[`${id}-${s}`].weight = n; else activeInputs[`${id}-${s}`].reps = n;
      }
    }
    
    function updateVal(id, s, type, val) {
      if(val === '') return;
      let n = parseFloat(val) || 0;
      activeInputs[`${id}-${s}`] = activeInputs[`${id}-${s}`] || {weight:0, reps:0};
      if(type === 'w') activeInputs[`${id}-${s}`].weight = n; 
      else activeInputs[`${id}-${s}`].reps = n;
    }

    function adjSets(id, d) {
      exerciseSetsCount[id] = Math.max(1, (exerciseSetsCount[id] || 3) + d);
      saveData(); renderWorkout(); showToast(`組數已調整`);
    }

    function logSet(exId, s, isAuto = false) {
      const d = getTodayStr(); if(!workoutLogs[d]) workoutLogs[d] = {}; if(!workoutLogs[d][exId]) workoutLogs[d][exId] = [];
      const wEl = document.getElementById(`w-${exId}-${s}`); const rEl = document.getElementById(`r-${exId}-${s}`);
      workoutLogs[d][exId] = workoutLogs[d][exId].filter(x => x.set !== s);
      workoutLogs[d][exId].push({set: s, weight: wEl ? parseFloat(wEl.value) : 0, reps: rEl ? parseInt(rEl.value) : 0});
      saveData(); showToast('記錄成功。'); renderWorkout();

      const pool = getFullPool(); const ex = pool.find(e => e.id === exId);
      const reqSets = (ex && (ex.isWarmup || ex.isHiit)) ? 1 : (exerciseSetsCount[exId] || (ex ? ex.sets : 3));

      if (!isAuto && ex && !ex.isWarmup && !ex.isHiit && !ex.isTimeBased) { utStart('rest', 60, { title: '準備下一組' }); }
      if (s >= reqSets) {
         const activeIds = assignedRoutines[currentDay] || [];
         if (currentStationIndex < activeIds.length - 1) setTimeout(() => { nextStation(); }, 800);
      }
    }
    function unlogSet(exId, s) {
      const d = getTodayStr(); if(uniTimer.active && uniTimer.exId === exId && uniTimer.setNum === s) utStop();
      if(workoutLogs[d] && workoutLogs[d][exId]) { workoutLogs[d][exId] = workoutLogs[d][exId].filter(x => x.set !== s); saveData(); renderWorkout(); }
    }

    function openApiKeyModal() {
      document.getElementById('input-api-key').value = localStorage.getItem('gym_coach_api_key') || "";
      document.getElementById('input-ai-model').value = localStorage.getItem('gym_coach_ai_model') || "gemini-2.5-flash";
      document.getElementById('apikey-modal').classList.remove('hidden');
    }
    
    function closeApiKeyModal() { document.getElementById('apikey-modal').classList.add('hidden'); }
    
    function saveApiKey() {
      const key = document.getElementById('input-api-key').value.trim();
      const model = document.getElementById('input-ai-model').value;

      if(key) { 
        localStorage.setItem('gym_coach_api_key', key); 
        localStorage.setItem('gym_coach_ai_model', model); 
        showToast("設定已儲存。"); 
      } 
      else { 
        localStorage.removeItem('gym_coach_api_key'); 
        showToast("API Key 已移除。"); 
      }
      closeApiKeyModal();
    }

    async function callGeminiAI(userQuery) {
      let apiKey = localStorage.getItem('gym_coach_api_key') || ""; 
      let aiModel = localStorage.getItem('gym_coach_ai_model') || "gemini-2.5-flash";
      apiKey = apiKey.trim();

      if (!apiKey) {
        return new Promise(resolve => {
          setTimeout(() => {
            resolve({ reply: "[提示] 請先於右上角設定 API Key。", action: "none", params: {} });
          }, 800);
        });
      }

      const url = `https://generativelanguage.googleapis.com/v1beta/models/${aiModel}:generateContent?key=${apiKey}`;
      const sysInstruction = `你係香港健身教練阿聰。用廣東話回覆。可以進行 action: updateBodyStats, logSet, none。回覆JSON格式: {"reply":"...","action":"...","params":{"weight":0,"bf":0}}`;
      
      const payload = { 
        contents: [{ parts: [{ text: userQuery }] }], 
        generationConfig: { responseMimeType: "application/json" } 
      };

      if (aiModel.includes('1.5') || aiModel.includes('2.')) {
          payload.systemInstruction = { parts: [{ text: sysInstruction }] };
      } else {
          payload.contents[0].parts[0].text = sysInstruction + "\n\n用戶要求：" + userQuery;
      }

      try {
        const res = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
        
        if (!res.ok) {
           const errText = await res.text();
           let errorDetail = errText;
           try { const errJson = JSON.parse(errText); errorDetail = errJson.error ? errJson.error.message : errText; } catch(e) {}
           throw new Error(`${res.status} - ${errorDetail}`);
        }
        
        const data = await res.json(); 
        if (data.candidates && data.candidates[0] && data.candidates[0].content) {
            return JSON.parse(data.candidates[0].content.parts[0].text);
        } else {
            throw new Error("Invalid response format");
        }

      } catch (error) {
        console.error("Gemini API Error:", error);
        throw error;
      }
    }

    async function sendChatMessage() {
      const input = document.getElementById('ai-user-input'); const text = input.value.trim(); if (!text) return; input.value = "";
      const chatBox = document.getElementById('ai-chat-box');
      chatBox.innerHTML += `<div class="bg-emerald-500/20 text-zinc-100 border border-emerald-500/30 max-w-[85%] rounded-2xl rounded-tr-none p-3 self-end shadow leading-relaxed">${text}</div>`;
      chatBox.scrollTop = chatBox.scrollHeight;
      
      const loaderId = 'loader-' + Date.now();
      chatBox.innerHTML += `<div id="${loaderId}" class="bg-zinc-800 text-zinc-400 border border-zinc-750 max-w-[85%] rounded-2xl rounded-tl-none p-3 self-start shadow"><i class="fa-solid fa-spinner animate-spin"></i> 思考中...</div>`;
      chatBox.scrollTop = chatBox.scrollHeight;
      
      try {
        const res = await callGeminiAI(text); 
        document.getElementById(loaderId).remove();
        chatBox.innerHTML += `<div class="bg-zinc-800 text-zinc-100 border border-zinc-750 max-w-[85%] rounded-2xl rounded-tl-none p-3 self-start shadow leading-relaxed">${res.reply}</div>`;
        if (res.action === 'updateBodyStats' && res.params.weight) { document.getElementById('input-weight').value = res.params.weight; saveBodyStats(); }
        else if (res.action === 'logSet') { showToast("記錄已儲存。"); }
      } catch(e) {
        document.getElementById(loaderId).remove();
        chatBox.innerHTML += `
          <div class="bg-zinc-800 text-red-400 border border-red-900 max-w-[85%] rounded-2xl p-3 self-start leading-relaxed">
            發生錯誤：<br>
            <div class="bg-black/50 p-2 rounded mt-2 text-[10px] font-mono break-words opacity-80">${e.message}</div>
          </div>`;
      }
      chatBox.scrollTop = chatBox.scrollHeight;
    }
    
    function autofillChat(txt) { document.getElementById('ai-user-input').value = txt; sendChatMessage(); }
    function handleChatKeydown(e) { if(e.key === 'Enter') sendChatMessage(); }
    function navigateTab(tab) {
      document.querySelectorAll('.tab-section').forEach(t => t.classList.add('hidden'));
      document.querySelectorAll('nav button').forEach(b => b.className = "flex flex-col items-center justify-center flex-1 h-full text-zinc-400 hover:text-zinc-200 transition-colors");
      document.getElementById(`tab-${tab}`).classList.remove('hidden');
      document.getElementById(`nav-${tab}`).className = "flex flex-col items-center justify-center flex-1 h-full text-emerald-400 transition-colors";
      if(tab === 'progress') { renderHistory(); renderBodyStats(); }
    }

    window.onload = () => { loadData(); renderWorkout(); };
  </script>
</body>
</html>
